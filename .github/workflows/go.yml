name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/fwilhe2/go-libreoffice:latest
    strategy:
      fail-fast: false
      matrix:
        LANG:
          - de_DE.UTF-8
          - en_US.UTF-8
    env:
      LANG: ${{ matrix.LANG }}

    steps:
      - uses: actions/checkout@v7

      # The job runs in a container, so the checkout is owned by a different
      # UID than the container user and git refuses to operate on it. Building
      # a main package (cmd/showcase) makes go embed VCS info, which runs git.
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: date
        run: |
          date

      - name: env
        run: |
          env | grep LANG

      - run: libreoffice --headless --version

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - uses: fwilhe2/odfvalidator-action@main

  # The cross-reader jobs check the generated documents against
  # implementations of the format other than LibreOffice, which accepts a
  # good deal the format does not allow and repairs the rest silently. They
  # run separately from the build job so that it is visible which reader
  # rejected a document, and they set RECHENBRETT_REQUIRE_CROSS_READERS so
  # that a reader that could not be installed fails the job instead of
  # quietly skipping the test.

  # Gnumeric is independent of LibreOffice and considerably stricter about
  # the format: it catches documents that do not conform.
  gnumeric:
    name: cross-reader (gnumeric)
    runs-on: ubuntu-latest
    env:
      RECHENBRETT_REQUIRE_CROSS_READERS: "1"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install gnumeric
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends gnumeric
          ssconvert --version

      - name: Test
        run: go test -v -run TestCompatGnumeric ./...

  # Euro-Office converts a document to an OOXML-shaped internal model on
  # import, the way Excel does, so it catches values that survive the import
  # but lose the formatting they are displayed with.
  euro-office:
    name: cross-reader (euro-office)
    runs-on: ubuntu-latest
    env:
      RECHENBRETT_REQUIRE_CROSS_READERS: "1"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      # Pulled in its own step so that an image that has moved or cannot be
      # fetched is reported as such, rather than as a test failure.
      - name: Pull the Euro-Office document server
        run: docker pull ghcr.io/euro-office/documentserver:latest

      - name: Test
        run: go test -v -run TestCompatEuroOffice ./...
