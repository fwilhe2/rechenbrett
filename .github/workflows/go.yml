name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/fwilhe2/go-libreoffice:latest
    strategy:
      fail-fast: false
      matrix:
        LANG:
          - de_DE.UTF-8
          - en_US.UTF-8
    env:
      LANG: ${{ matrix.LANG }}

    steps:
      - uses: actions/checkout@v7

      # The job runs in a container, so the checkout is owned by a different
      # UID than the container user and git refuses to operate on it. Building
      # a main package (cmd/showcase) makes go embed VCS info, which runs git.
      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: date
        run: |
          date

      - name: env
        run: |
          env | grep LANG

      - run: libreoffice --headless --version

      # Gnumeric reads the generated documents as a second implementation of
      # the format, independent of LibreOffice and stricter about it; see
      # compat_test.go. The cross-reader test skips itself when ssconvert is
      # missing, so a failure to install it must not fail the job silently.
      - name: Install gnumeric
        run: |
          apt-get update
          apt-get install --yes --no-install-recommends gnumeric
          ssconvert --version

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - uses: fwilhe2/odfvalidator-action@main
